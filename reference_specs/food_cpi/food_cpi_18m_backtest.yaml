# Reference MultiTargetBacktestSpec: Canada Food CPI, 18-month ahead forecast
#
# Evaluates predictors twice per year (January and July origins) from 2000 to
# present across all 9 food CPI categories from Canada's Food Price Report (CFPR).
# Requires 24 months of history before the first forecast (warmup).
#
# This is the CFPR-replica experiment: 18-month horizon matches the annual
# forecast cycle of the Canada's Food Price Report.  Origins run from Jan 2000
# through Jan 2026.  Origins whose resolution date is in the future are
# automatically skipped by the backtest harness — no manual truncation needed.
#
# Prerequisites:
#   uv run python scripts/fetch_cpi.py   # populate StatCan food CPI cache
#
# To load this spec in Python:
#
#   import yaml
#   from aieng.forecasting.evaluation import MultiTargetBacktestSpec
#
#   with open("reference_specs/food_cpi/food_cpi_18m_backtest.yaml") as f:
#       spec = MultiTargetBacktestSpec.model_validate(yaml.safe_load(f))
#
#   from aieng.forecasting.evaluation import multi_backtest
#   results = multi_backtest(predictor=my_predictor, spec=spec, data_service=svc)
#   for task_id, result in results.items():
#       print(f"{task_id}: mean CRPS = {result.mean_crps:.4f}")

tasks:
  - task_id: food_cpi_overall_18m
    target_series_id: cpi_food_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Food (overall food index, 2002=100) exactly 18
      months ahead of the forecast origin.

  - task_id: food_cpi_bakery_cereal_18m
    target_series_id: cpi_bakery_cereal_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Bakery and cereal products (excl. baby food,
      2002=100) exactly 18 months ahead.

  - task_id: food_cpi_dairy_eggs_18m
    target_series_id: cpi_dairy_eggs_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Dairy products and eggs (2002=100) exactly 18
      months ahead.

  - task_id: food_cpi_fish_seafood_18m
    target_series_id: cpi_fish_seafood_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Fish, seafood and other marine products
      (2002=100) exactly 18 months ahead.

  - task_id: food_cpi_restaurants_18m
    target_series_id: cpi_restaurants_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Food purchased from restaurants (2002=100)
      exactly 18 months ahead.

  - task_id: food_cpi_fruit_preparations_nuts_18m
    target_series_id: cpi_fruit_preparations_nuts_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Fruit, fruit preparations and nuts (2002=100)
      exactly 18 months ahead.

  - task_id: food_cpi_meat_18m
    target_series_id: cpi_meat_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Meat (2002=100) exactly 18 months ahead.

  - task_id: food_cpi_other_food_18m
    target_series_id: cpi_other_food_nonalcoholic_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Other food products and non-alcoholic beverages
      (2002=100) exactly 18 months ahead.

  - task_id: food_cpi_vegetables_18m
    target_series_id: cpi_vegetables_preparations_canada
    horizon: 18
    frequency: MS
    description: >
      Forecast Canada-wide CPI Vegetables and vegetable preparations (2002=100)
      exactly 18 months ahead.

# Backtest window: January 2000 through January 2026.
# Origins whose 18-month resolution date is still in the future are
# automatically skipped by the harness.
start: "2000-01-01"
end: "2026-01-01"

# stride=6 on monthly (MS) frequency gives January and July origins —
# mirroring the CFPR evaluation cycle.
stride: 6

# Require 24 months of history before the first forecast origin.
warmup: 24
