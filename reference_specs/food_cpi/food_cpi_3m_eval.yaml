# Reference MultiTargetEvalSpec: Canada Food CPI, 3-month ahead — protected eval window
#
# This spec covers a recent held-out window (Jan 2024 → Jan 2026) for
# estimating how well backtested predictors generalise at the 3-month horizon.
#
# Design rationale
# ----------------
# At a 3-month horizon and 3-month stride, this window yields ~9 resolvable
# origins (Jan 2024, Apr 2024, Jul 2024, Oct 2024, Jan 2025, Apr 2025,
# Jul 2025, Oct 2025, Jan 2026).  Each origin resolves 3 months later, well
# within available StatCan data as of mid-2026.
#
# Having ~9 eval origins (vs ~5 for the 18m experiment) makes the 3m eval
# distribution more reliable for:
#   - Model selection: larger eval samples give more stable CRPS estimates
#   - Calibration assessment: more quantile-coverage data points
#   - Confidence interval construction: reduced uncertainty in mean CRPS
#
# Budget semantics
# ----------------
# One call to multi_evaluate() counts as ONE run against max_runs regardless of
# how many food categories are included.
#
# To load this spec in Python:
#
#   import yaml
#   from pathlib import Path
#   from aieng.forecasting.evaluation import MultiTargetEvalSpec, EvalTracker, multi_evaluate
#
#   with open("reference_specs/food_cpi/food_cpi_3m_eval.yaml") as f:
#       spec = MultiTargetEvalSpec.model_validate(yaml.safe_load(f))
#
#   tracker = EvalTracker(Path("eval_runs.yaml"))
#   results = multi_evaluate(predictor=my_predictor, spec=spec, data_service=svc, tracker=tracker)

spec_id: food_cpi_3m_eval

tasks:
  - task_id: food_cpi_overall_3m
    target_series_id: cpi_food_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Food (overall food index, 2002=100) exactly 3
      months ahead of the forecast origin.

  - task_id: food_cpi_bakery_cereal_3m
    target_series_id: cpi_bakery_cereal_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Bakery and cereal products (excl. baby food,
      2002=100) exactly 3 months ahead.

  - task_id: food_cpi_dairy_eggs_3m
    target_series_id: cpi_dairy_eggs_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Dairy products and eggs (2002=100) exactly 3
      months ahead.

  - task_id: food_cpi_fish_seafood_3m
    target_series_id: cpi_fish_seafood_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Fish, seafood and other marine products
      (2002=100) exactly 3 months ahead.

  - task_id: food_cpi_restaurants_3m
    target_series_id: cpi_restaurants_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Food purchased from restaurants (2002=100)
      exactly 3 months ahead.

  - task_id: food_cpi_fruit_preparations_nuts_3m
    target_series_id: cpi_fruit_preparations_nuts_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Fruit, fruit preparations and nuts (2002=100)
      exactly 3 months ahead.

  - task_id: food_cpi_meat_3m
    target_series_id: cpi_meat_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Meat (2002=100) exactly 3 months ahead.

  - task_id: food_cpi_other_food_3m
    target_series_id: cpi_other_food_nonalcoholic_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Other food products and non-alcoholic beverages
      (2002=100) exactly 3 months ahead.

  - task_id: food_cpi_vegetables_3m
    target_series_id: cpi_vegetables_preparations_canada
    horizon: 3
    frequency: MS
    description: >
      Forecast Canada-wide CPI Vegetables and vegetable preparations (2002=100)
      exactly 3 months ahead.

# Eval window: January 2024 → January 2026 (~9 resolvable origins at 3-month stride).
start: "2024-01-01"
end: "2026-01-01"
stride: 3
warmup: 24

# Budget: 5 multi_evaluate() calls per participant.
max_runs: 5
